[mode]
name = "default"
display_name = "Standardized Spec-Driven Mode"
description = "A robust, state-machine based workflow for spec-driven development."
version = "1.0.0"

[areas]
default = ["Staging", "Working", "Testing", "Fixing", "Build"]
protected = ["Build"]
default_area = "Staging"

[readiness]
queue_file = "queue.md"
required_for_push = true
areas = ["Staging", "Fixing"]

[readiness.area_filters.staging]
push_files = ["topic.md", "spec.md", "task.md", "queue.md"]

[readiness.area_filters.working]
push_files = ["topic.md", "spec.md", "task.md", "queue.md"]

[readiness.area_filters.testing]
push_files = ["topic.md", "spec.md", "task.md"]
delete_files = ["queue.md"]

[readiness.area_filters.fixing]
push_files = ["topic.md", "spec.md", "task.md"]

[readiness.area_filters.build]
push_files = ["topic.md", "spec.md", "task.md"]

[capabilities]
spec_writing = true
building = true
verification = true
connectors = true
custom_workflows = true

[templates]
spec_file = "spec.md"
task_file = "task.md"
area_file = "area.md"
use_area_templates = true

[scripts]
post_activate = "echo 'Mode activated. Use /spec, /build, /test, or /verify to start.'"
